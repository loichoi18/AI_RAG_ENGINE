# ---------------------------------------------------------------------------
# Full local stack: API + Qdrant + Ollama + Streamlit frontend.
#
# Design decisions:
#  * Independent services so each scales/restarts on its own and the API stays a
#    thin stateless layer over stateful backends.
#  * Named volumes persist Qdrant vectors and pulled Ollama models across
#    restarts (avoids re-downloading multi-GB model weights).
#  * Services reach each other by service name on the default compose network,
#    overriding localhost defaults via env vars.
#  * depends_on with service_healthy gates startup ordering.
#  * The frontend is a thin Streamlit client that calls the API over HTTP.
#
# Run from the repo root:   docker compose -f docker/docker-compose.yml up --build
# Then seed demo data:      docker exec rag-api python -m scripts.bootstrap_demo
# ---------------------------------------------------------------------------

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      RAG_ENVIRONMENT: local
      RAG_QDRANT__HOST: qdrant
      RAG_QDRANT__PORT: "6333"
      RAG_LLM__PROVIDER: ollama
      RAG_LLM__OLLAMA_BASE_URL: http://ollama:11434
      RAG_LOGGING__JSON_LOGS: "true"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/v1/health').raise_for_status()"]
      interval: 15s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      RAG_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_storage:
  ollama_models:
